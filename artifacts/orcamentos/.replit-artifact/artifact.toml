kind = "web"
previewPath = "/orcamentos/"
title = "Fretai - Orçamentos"
version = "1.0.0"
id = "artifacts/orcamentos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/orcamentos/" ]
localPort = 22979

[services.development]
run = "pnpm --filter @workspace/orcamentos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/orcamentos", "run", "build" ]
publicDir = "artifacts/orcamentos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22979"
BASE_PATH = "/orcamentos/"
